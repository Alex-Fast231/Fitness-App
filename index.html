<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#f7f6f2"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Training"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Mein Krafttraining</title>
<script src="exercises.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f7f6f2;color:#1a1a1a;font-family:'Georgia','Times New Roman',serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#d0cfc8;border-radius:2px}
#app{max-width:680px;margin:0 auto;min-height:100dvh}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(247,246,242,.96);backdrop-filter:blur(12px);border-bottom:1px solid #e8e6e0;padding:12px 16px;display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:none;font-size:20px;color:#888;padding:2px 6px 2px 0;line-height:1;flex-shrink:0}
.back-btn:active{color:#333}
.topbar-titles{flex:1;min-width:0}
.topbar-sub{font-size:10px;letter-spacing:.25em;color:#999;font-family:'Courier New',monospace;text-transform:uppercase}
.topbar-title{font-size:15px;color:#1a1a1a;margin-top:1px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.phase-dot{width:7px;height:7px;border-radius:50%}
.phase-label{font-size:11px;color:#999;font-family:'Courier New',monospace}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:rgba(247,246,242,.96);backdrop-filter:blur(14px);border-top:1px solid #e8e6e0;display:flex;justify-content:space-around;padding:10px 0;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:50}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;flex:1}
.nav-icon{font-size:19px}
.nav-lbl{font-size:8px;font-family:'Courier New',monospace;letter-spacing:.05em;text-transform:uppercase}

/* CONTENT */
.content{padding:16px 16px 100px}

/* HERO */
.hero{border-radius:14px;padding:20px 18px;margin-bottom:18px;border:1px solid transparent}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-val{font-size:20px;font-family:'Courier New',monospace;margin:4px 0 2px}
.stat-lbl{font-size:9px;color:#999;letter-spacing:.15em;text-transform:uppercase}

/* SECTION LABEL */
.slabel{font-size:10px;letter-spacing:.2em;color:#aaa;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:10px}

/* PHASE GRID */
.phase-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.phase-btn{border-radius:10px;padding:14px 16px;text-align:left;cursor:pointer;transition:all .15s;width:100%;background:#fff;border:1px solid #e8e6e0;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* SESSION BTN */
.sess-btn{width:100%;margin-bottom:8px;background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;text-align:left;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* EXERCISE CARD */
.excard{background:#fff;border:1px solid #e8e6e0;border-radius:10px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.excard-body{padding:14px 16px}
.ex-stats{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.ex-stat{background:#f7f6f2;border:1px solid #e8e6e0;border-radius:8px;padding:8px 14px;text-align:center;min-width:52px}
.ex-stat-val{font-size:17px;font-family:'Courier New',monospace}
.ex-stat-lbl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.15em}
.last-box{background:#f0faf0;border:1px solid #c8e6c8;border-radius:8px;padding:8px 12px;text-align:center}
.last-val{font-size:13px;font-family:'Courier New',monospace;color:#2e7d32}
.last-lbl{font-size:9px;color:#66a166;text-transform:uppercase;letter-spacing:.1em}

/* HISTORY STRIP */
.hist-strip{border-top:1px solid #f0ede8;padding:8px 16px;display:flex;gap:6px;overflow-x:auto;background:#fafaf8;align-items:center}
.hist-chip{font-size:11px;font-family:'Courier New',monospace;color:#888;background:#eeede8;border-radius:4px;padding:3px 8px;white-space:nowrap;display:flex;align-items:center;gap:4px}
.hdel{background:none;border:none;color:#ccc;font-size:12px;padding:0 2px;cursor:pointer;line-height:1}
.hdel:hover{color:#e53935}

/* EDIT/LOG */
.edit-panel{background:#f7f6f2;border:1px solid #e8e6e0;border-radius:8px;padding:14px;margin:10px 0}
.log-panel{background:#f0faf0;border:1px solid #c8e6c8;border-radius:8px;padding:14px;margin:10px 0}
.panel-lbl{font-size:10px;font-family:'Courier New',monospace;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.num-row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
.num-group label{display:block;font-size:10px;font-family:'Courier New',monospace;color:#aaa;letter-spacing:.1em;margin-bottom:6px}
.num-ctrl{display:flex;align-items:center;gap:6px}
.num-btn{width:30px;height:30px;border-radius:6px;background:#fff;border:1px solid #ddd;color:#555;font-size:16px;display:flex;align-items:center;justify-content:center}
.num-btn:active{background:#f0ede8}
.num-val{min-width:46px;text-align:center;font-family:'Courier New',monospace;font-size:15px;color:#1a1a1a}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:12px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-family:'Courier New',monospace;border:1px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-log{background:#f0faf0;border-color:#c8e6c8 !important;color:#2e7d32}
.btn-edit{background:#f7f6f2;border-color:#ddd !important;color:#666}
.btn-save-log{background:#2e7d32;border-color:#2e7d32 !important;color:#fff;font-weight:700}
.btn-cancel{background:transparent;border-color:#ddd !important;color:#aaa}

/* COACH TIP */
.coach-tip{background:#fffde7;border:1px solid #fff176;border-radius:8px;padding:9px 13px;margin:8px 0;display:flex;align-items:flex-start;gap:8px}
.coach-tip-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.coach-tip-text{font-size:12px;color:#5d4037;font-family:'Courier New',monospace;line-height:1.5}

/* REPLACE SUGGESTIONS */
.replace-panel{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:14px;margin:10px 0}
.suggest-card{background:#fff;border:1px solid #e8e6e0;border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.suggest-card:active{background:#e8f0fe;border-color:#1565c0}

/* PR STRIP */
.pr-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;margin-bottom:20px}
.pr-card{background:#fff;border-radius:10px;padding:12px 14px;min-width:110px;flex:0 0 auto;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e8e6e0}

/* SETTINGS */
.settings-input{width:100%;padding:10px 14px;border-radius:8px;background:#fff;border:1px solid #ddd;color:#1a1a1a;font-size:13px;font-family:'Courier New',monospace;outline:none;margin-bottom:10px}
.settings-btn{width:100%;padding:11px;border-radius:8px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:.1em;border:1px solid #ddd;cursor:pointer}

/* BODY MEASUREMENTS */
.body-wrap{position:relative;margin:0 auto 20px;width:180px;height:340px}
.mpoint{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2}
.mdot{width:24px;height:24px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Courier New',monospace;font-weight:700;color:#fff;transition:transform .1s}
.mdot:active{transform:scale(1.15)}
.mlabel{position:absolute;font-size:9px;font-family:'Courier New',monospace;white-space:nowrap;letter-spacing:.04em;pointer-events:none}
.mcard{background:#fff;border:1px solid #e8e6e0;border-radius:10px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mcard-body{padding:13px 16px}
.step-toggle{display:inline-flex;gap:3px;background:#f0ede8;border-radius:8px;padding:3px}
.step-opt{padding:4px 9px;border-radius:5px;border:none;font-family:'Courier New',monospace;font-size:11px;color:#888;background:transparent;cursor:pointer;transition:all .12s}
.step-opt.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* CALENDAR */
.cal-wrap{background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #f0ede8}
.cal-nav{background:none;border:none;font-size:18px;color:#888;padding:4px 8px;border-radius:6px}
.cal-nav:active{background:#f0ede8}
.cal-month{font-size:15px;color:#1a1a1a;font-family:'Courier New',monospace}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;padding:8px 2px;font-size:10px;font-family:'Courier New',monospace;color:#bbb;letter-spacing:.05em}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;margin:2px;position:relative;transition:background .1s}
.cal-day:hover{background:#f7f6f2}
.cal-day.empty{cursor:default}
.cal-day.trained{background:#f0faf0}
.cal-day.selected{background:#e8f0fe !important;outline:2px solid #1565c0}
.cal-num{font-size:13px;color:#555;font-family:'Courier New',monospace;line-height:1}
.cal-dot{width:6px;height:6px;border-radius:50%;margin-top:2px}
.cal-dot-multi{display:flex;gap:2px;margin-top:2px}
.cal-dot-sm{width:4px;height:4px;border-radius:50%}

/* DAY DETAIL */
.day-detail{background:#f0faf0;border:1px solid #c8e6c8;border-radius:12px;padding:16px;margin-bottom:16px}
.day-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.day-detail-close{background:none;border:none;font-size:18px;color:#888;cursor:pointer;padding:2px 4px}
.day-entry-card{background:#fff;border:1px solid #e8e6e0;border-radius:8px;padding:10px 12px;margin-bottom:8px}

/* WEEK BAR */
.week-bar{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.week-cell{flex:0 0 auto;background:#fff;border:1px solid #e8e6e0;border-radius:8px;padding:8px 10px;text-align:center;min-width:44px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.week-cell.has-training{border-color:#c8e6c8;background:#f0faf0}
.week-cell-day{font-size:9px;font-family:'Courier New',monospace;color:#bbb;text-transform:uppercase}
.week-cell-num{font-size:15px;font-family:'Courier New',monospace;color:#ccc;margin:2px 0}
.week-cell.has-training .week-cell-num{color:#2e7d32}
.week-cell-dot{width:6px;height:6px;border-radius:50%;margin:0 auto}

/* FREE TRAINING */
.free-ex-card{background:#fff;border:1px solid #e8e6e0;border-radius:8px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.free-input{padding:8px 10px;border-radius:8px;border:1px solid #ddd;font-size:13px;outline:none;font-family:'Courier New',monospace;background:#fff}

/* BADGE */
.badge-eq{font-size:10px;padding:2px 7px;border-radius:10px;font-family:'Courier New',monospace;border:1px solid}
.logged-badge{font-size:11px;font-family:'Courier New',monospace;color:#2e7d32;font-weight:600}

/* SESS TABS */
.sess-tabs{display:flex;gap:6px;overflow-x:auto;margin-top:10px;padding-bottom:2px;flex-wrap:nowrap}
.sess-tab{padding:5px 11px;border-radius:14px;font-size:11px;font-family:'Courier New',monospace;border:1px solid #ddd;cursor:pointer;background:#fff;white-space:nowrap;flex-shrink:0}
</style>
</head>

// ─── MIGRATION ────────────────────────────────────────────────────────────────
(function migrate(){
  const DATA_KEY='training_app_data';
  // Schon migriert?
  const existing=ls(DATA_KEY,null);
  if(existing&&existing._migrated) return;

  const oldLogKeys=['fp3_log','fp2_log','fp_log','fitapp_log'];
  const oldPlanKeys=['fp3_plan','fp2_plan','fp_plan','fitapp_plan'];
  const oldMeasKeys=['fp3_meas','fp2_meas'];
  const oldWlogKeys=['fp3_wlog','fp2_wlog'];
  const oldFreeKeys=['fp3_free','fp2_free'];

  // Log zusammenführen
  let mergedLog=existing?existing.log||{}:{};
  oldLogKeys.forEach(k=>{
    try{
      const old=JSON.parse(localStorage.getItem(k)||'{}');
      Object.entries(old).forEach(([exId,entries])=>{
        if(!mergedLog[exId])mergedLog[exId]=[];
        const existingDates=new Set(mergedLog[exId].map(e=>e.date));
        entries.forEach(e=>{if(!existingDates.has(e.date))mergedLog[exId].push(e);});
      });
    }catch{}
  });

  // Plan: nimm den ersten der vorhanden ist
  let mergedPlan=existing?existing.plan||null:null;
  if(!mergedPlan){
    for(const k of oldPlanKeys){
      try{const v=localStorage.getItem(k);if(v){mergedPlan=JSON.parse(v);break;}}catch{}
    }
  }

  // Maße
  let mergedMeas=existing?existing.measurements||{}:{};
  for(const k of oldMeasKeys){
    try{const v=localStorage.getItem(k);if(v&&Object.keys(mergedMeas).length===0){mergedMeas=JSON.parse(v);break;}}catch{}
  }

  // Gewicht
  let mergedWlog=existing?existing.weightLog||[]:[]; 
  for(const k of oldWlogKeys){
    try{const v=localStorage.getItem(k);if(v&&mergedWlog.length===0){mergedWlog=JSON.parse(v);break;}}catch{}
  }

  // Freies Training
  let mergedFree=existing?existing.freeSession||{exercises:[]}:{exercises:[]};
  for(const k of oldFreeKeys){
    try{const v=localStorage.getItem(k);if(v&&(!mergedFree.exercises||mergedFree.exercises.length===0)){mergedFree=JSON.parse(v);break;}}catch{}
  }

  const newData={
    _migrated:true,
    _version:5,
    _migratedAt:new Date().toISOString(),
    log:mergedLog,
    plan:mergedPlan,
    measurements:mergedMeas,
    weightLog:mergedWlog,
    freeSession:mergedFree,
  };
  lss(DATA_KEY,newData);
  console.log('Migration OK. Einträge:', Object.values(mergedLog).reduce((a,b)=>a+b.length,0));
})();

// Logs ohne exName (alte Einträge vor diesem Update) werden immer mit angezeigt,
// damit keine bestehenden Daten "verschwinden".
function getHistForEx(ex){
  const all=S.log[ex.id]||[];
  return all.filter(e=>!e.exName||e.exName===ex.name);
}

// ─── REGELBASIERTER COACH (3-Log-Regel) ──────────────────────────────────────
function getCoachTip(ex){
  const hist=getHistForEx(ex);
  if(hist.length===0) return {icon:'📋',text:'Kein Verlauf – starte mit dem Plangewicht und fokussiere Technik.'};

  const last=hist[hist.length-1];
  if(ex.unit==='sek'||ex.unit==='–'){
    return {icon:'✓',text:`Letztes Mal: ${last.sets}×${last.reps}. Ziel halten oder 5 Sek erhöhen.`};
  }

  // 3-Log-Regel: letzte 3 Einträge alle Ziel erreicht, ohne Planänderung dazwischen?
  if(hist.length>=3){
    const last3=hist.slice(-3);
    const allSuccess=last3.every(e=>{
      const gs=e.goalSets||ex.sets;
      const gr=e.goalReps||ex.reps;
      return e.sets>=gs&&e.reps>=gr;
    });
    // Planänderung: prüfen ob goalWeight sich in den letzten 3 verändert hat
    const weights=last3.map(e=>e.goalWeight!==undefined?e.goalWeight:e.weight);
    const noWeightChange=weights.every(w=>w===weights[0]);

    if(allSuccess&&noWeightChange&&last.weight>0){
      return {icon:'📈',text:`3× Ziel erreicht bei ${last.weight}kg. Heute +2,5 kg → ${last.weight+2.5} kg versuchen.`};
    }
    if(allSuccess&&noWeightChange&&last.weight===0){
      return {icon:'📈',text:`3× Ziel erreicht. Sätze oder Wiederholungen erhöhen.`};
    }
  }

  // Einzelcheck letzter Eintrag
  const goalS=last.goalSets||ex.sets;
  const goalR=last.goalReps||ex.reps;
  const fullSuccess=last.sets>=goalS&&last.reps>=goalR;
  const close=last.sets>=goalS&&last.reps>=Math.round(goalR*0.85);

  if(fullSuccess) return {icon:'➡',text:`Letztes Mal Ziel erreicht (${last.sets}×${last.reps}·${last.weight}kg). Noch ${hist.length<3?3-hist.length:0}× zum Erhöhen.`};
  if(close) return {icon:'➡',text:`Knapp geschafft (${last.sets}×${last.reps}·${last.weight}kg). Gewicht halten.`};
  const newW=last.weight>0?parseFloat((last.weight*0.95).toFixed(1)):0;
  return {icon:'📉',text:`Ziel verfehlt (${last.reps}/${goalR} Wdhl). Gewicht auf ${newW}kg reduzieren, Technik prüfen.`};
}

// ─── ÜBUNG ERSETZEN (lokal) ───────────────────────────────────────────────────
function startReplace(exId, exName, exEq){
  S.replaceMode=exId;
  S.editing=null; S.logMode=null;
  const pool=getPool();
  // Planübungen ausschließen
  const planNames=new Set();
  S.plan.forEach(ph=>ph.sessions.forEach(s=>s.exercises.forEach(e=>planNames.add(e.name))));

  const poolEntry=pool.find(p=>p.name===exName);
  let suggestions=[];

  if(poolEntry&&poolEntry.alts&&poolEntry.alts.length>0){
    suggestions=poolEntry.alts
      .map(altName=>pool.find(p=>p.name===altName))
      .filter(Boolean)
      .filter(p=>!planNames.has(p.name))
      .slice(0,3);
  }
  if(suggestions.length<3&&poolEntry){
    const byMuscle=pool.filter(p=>p.muscle===poolEntry.muscle&&p.name!==exName&&!planNames.has(p.name)&&!suggestions.find(s=>s.name===p.name));
    suggestions=[...suggestions,...byMuscle].slice(0,3);
  }
  if(suggestions.length<3){
    const byEq=pool.filter(p=>p.eq===exEq&&p.name!==exName&&!planNames.has(p.name)&&!suggestions.find(s=>s.name===p.name));
    suggestions=[...suggestions,...byEq].slice(0,3);
  }
  S.replaceSuggestions=suggestions.slice(0,3);
  render();
}

function applyReplace(exId, suggIdx){
  const s=S.replaceSuggestions[suggIdx];
  if(!s)return;
  const ex=curSess().exercises.find(e=>e.id===exId);
  if(!ex)return;
  // Originalzustand merken (nur beim ERSTEN Ersetzen, nicht überschreiben bei mehrfachem Wechsel)
  if(!ex.original){
    ex.original={name:ex.name,eq:ex.eq,sets:ex.sets,reps:ex.reps,weight:ex.weight,unit:ex.unit,note:ex.note};
  }
  ex.name=s.name; ex.eq=s.eq;
  ex.sets=s.sets; ex.reps=s.reps;
  ex.weight=s.weight; ex.unit=s.unit||'kg';
  ex.note=s.note;
  S.replaceMode=null; S.replaceSuggestions=[];
  persist(); render();
}

function revertToOriginal(exId){
  const ex=curSess().exercises.find(e=>e.id===exId);
  if(!ex||!ex.original)return;
  Object.assign(ex,ex.original);
  delete ex.original;
  persist(); render();
}

function saveLog(id){

    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.log){S.importMsg={ok:false,text:'⚠ Ungültige Datei.'};render();return;}
      if(data.log) S.log=data.log;
      if(data.plan) S.plan=data.plan;

      if(data.weightLog) S.weightLog=data.weightLog;

function generateWorkout(){
  const pool=getPool();
  const allowedEq=S.freeEquip==='home'?['–']:['–','KH','LH','Stange','Maschine','Band'];
  const planNames=new Set();
  S.plan.forEach(ph=>ph.sessions.forEach(s=>s.exercises.forEach(e=>planNames.add(e.name))));

  // Wie viele Übungen für die gewählte Dauer
  const countMap={10:2,20:4,30:5,45:7};
  const count=countMap[S.freeGoalDuration]||4;

  // Muskelgruppen-Quelle: gewählt oder Lücken-Analyse
  let targetMuscles=S.freeGoalMuscles.length>0
    ?S.freeGoalMuscles
    :getMuscleAnalysis().gaps.concat(getMuscleAnalysis().weak);

  if(targetMuscles.length===0) targetMuscles=['Beine','Rücken','Brust','Core','Schulter','Arme'];

  // Gleichmäßig über Muskelgruppen verteilen
  const perMuscle=Math.ceil(count/targetMuscles.length);
  const result=[];
  const used=new Set();

  targetMuscles.forEach(muscle=>{
    if(result.length>=count)return;
    const candidates=pool.filter(p=>
      p.muscle===muscle&&
      allowedEq.includes(p.eq)&&
      !planNames.has(p.name)&&
      !used.has(p.name)
    ).sort(()=>Math.random()-0.5);
    candidates.slice(0,perMuscle).forEach(ex=>{
      if(result.length<count){result.push({...ex});used.add(ex.name);}
    });
  });

  // Falls noch Plätze frei: Auffüllen aus Pool
  if(result.length<count){
    const filler=pool.filter(p=>allowedEq.includes(p.eq)&&!planNames.has(p.name)&&!used.has(p.name))
      .sort(()=>Math.random()-0.5);
    filler.forEach(ex=>{if(result.length<count){result.push({...ex});used.add(ex.name);}});
  }

  S.generatedWorkout=result;
  render();
}

function getMuscleAnalysis(){
  // Letzte 7 Tage rollierend
  const since=new Date();since.setDate(since.getDate()-7);
  const sinceKey=since.toISOString().split('T')[0];

  // Trainierte Muskelgruppen aus Logs sammeln
  const trained={};
  S.plan.forEach(ph=>ph.sessions.forEach(s=>s.exercises.forEach(ex=>{
    const pool=getPool();
    const poolEntry=pool.find(p=>p.name===ex.name);
    const muscle=poolEntry?poolEntry.muscle:'Sonstige';
    const secondary=poolEntry?poolEntry.secondary||[]:[];
    (S.log[ex.id]||[]).forEach(e=>{
      if(e.date&&dateKey(e.date)>=sinceKey){
        trained[muscle]=(trained[muscle]||0)+1;
        secondary.forEach(m=>{trained[m]=(trained[m]||0)+0.5;});
      }
    });
  })));

  // Alle Muskelgruppen die im Pool vorkommen
  const allMuscles=['Beine','Brust','Rücken','Schulter','Arme','Core'];
  const gaps=allMuscles.filter(m=>!trained[m]||trained[m]<1);
  const weak=allMuscles.filter(m=>trained[m]&&trained[m]<2&&!gaps.includes(m));

  // Übungen vorschlagen aus Pool — NICHT aus Trainingsplan
  const pool=getPool();
  const planNames=new Set();
  S.plan.forEach(ph=>ph.sessions.forEach(s=>s.exercises.forEach(e=>planNames.add(e.name))));

  const priorityMuscles=[...gaps,...weak];
  const suggestions=[];
  const allowedEq=S.freeEquip==='home'?['–']:['–','KH','LH','Stange','Maschine','Band'];
  priorityMuscles.forEach(muscle=>{
    if(suggestions.length>=6)return;
    const candidates=pool.filter(p=>p.muscle===muscle&&!planNames.has(p.name)&&allowedEq.includes(p.eq)&&!suggestions.find(s=>s.name===p.name));
    // Zufällig 1-2 pro Muskelgruppe
    const pick=candidates.sort(()=>Math.random()-0.5).slice(0,gaps.includes(muscle)?2:1);
    suggestions.push(...pick);
  });

  return {trained,gaps,weak,suggestions:suggestions.slice(0,6)};
}

// ─── RENDER: CALENDAR ─────────────────────────────────────────────────────────
function rCalendar(){
  const dateMap=buildDateMap();
  const y=S.calYear, m=S.calMonth;
  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dowLabels=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const today=todayKey();
  const firstDow=(new Date(y,m,1).getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  let dayCells='';
  for(let i=0;i<firstDow;i++) dayCells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entries=dateMap[dk]||[];
    const trained=entries.length>0;
    const isToday=dk===today;
    const isSelected=dk===S.calSelected;
    const colors=[...new Set(entries.map(e=>e.phaseColor))];
    let dotHtml='';
    if(trained){
      if(colors.length===1) dotHtml=`<div class="cal-dot" style="background:${colors[0]}"></div>`;
      else dotHtml=`<div class="cal-dot-multi">${colors.slice(0,3).map(c=>`<div class="cal-dot-sm" style="background:${c}"></div>`).join('')}</div>`;
    }
    const cls=['cal-day',trained?'trained':'',isToday?'today':'',isSelected?'selected':''].filter(Boolean).join(' ');
    dayCells+=`<div class="${cls}" onclick="selectCalDay('${dk}')">
      <span class="cal-num" style="${isToday?'font-weight:700':''}${trained&&!isToday?';color:#2e7d32':''}">${d}</span>
      ${dotHtml}
    </div>`;
  }
  let detail='';
  if(S.calSelected){
    const entries=dateMap[S.calSelected]||[];
    const selDate=new Date(S.calSelected+'T12:00:00');
    const selLabel=selDate.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
    if(entries.length>0){
      const grouped={};
      entries.forEach(e=>{if(!grouped[e.exName])grouped[e.exName]={entries:[],exId:e.exId,phaseColor:e.phaseColor};grouped[e.exName].entries.push(e);});
      const rows=Object.entries(grouped).map(([name,g])=>`<div class="day-entry-card">
        <div style="font-size:14px;color:#1a1a1a">${name}</div>
        ${g.entries.map((e,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <span style="font-size:13px;font-family:'Courier New',monospace;color:${e.phaseColor}">${e.entry.sets}×${e.entry.reps} · ${e.entry.weight}kg</span>
          <button class="hdel" onclick="delLog('${e.exId}',${e.idx});selectCalDay('${S.calSelected}')" style="color:#ddd;font-size:13px">✕</button>
        </div>`).join('')}
      </div>`).join('');
      detail=`<div class="day-detail"><div class="day-detail-header">
        <div><div style="font-size:11px;color:#2e7d32;font-family:'Courier New',monospace;text-transform:uppercase">Training</div><div style="font-size:16px;color:#1a1a1a">${selLabel}</div></div>
        <button class="day-detail-close" onclick="S.calSelected=null;render()">✕</button>
      </div>${rows}</div>`;
    } else {
      detail=`<div class="day-detail" style="background:#f7f6f2;border-color:#e8e6e0"><div class="day-detail-header">
        <div style="font-size:15px;color:#1a1a1a">${selLabel}</div>
        <button class="day-detail-close" onclick="S.calSelected=null;render()">✕</button>
      </div><div style="font-size:13px;color:#aaa;font-style:italic">Kein Training an diesem Tag.</div></div>`;
    }
  }
  let streak=0;
  const dk0=new Date();
  for(let i=0;i<365;i++){const d=new Date(dk0);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];if(dateMap[k]&&dateMap[k].length>0)streak++;else if(i>0)break;}
  const totalDays=Object.keys(dateMap).length;

  return `<div class="content">
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <div class="stat-box" style="flex:1"><div style="font-size:18px">🔥</div><div class="stat-val" style="color:#e65100">${streak}</div><div class="stat-lbl">Streak</div></div>
    <div class="stat-box" style="flex:1"><div style="font-size:18px">📅</div><div class="stat-val" style="color:#2e7d32">${totalDays}</div><div class="stat-lbl">Trainingstage</div></div>
    <div class="stat-box" style="flex:1"><div style="font-size:18px">💪</div><div class="stat-val" style="color:#1565c0">${Object.values(S.log).reduce((a,b)=>a+b.length,0)}</div><div class="stat-lbl">Sätze</div></div>
  </div>
  ${detail}
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <span class="cal-month">${monthNames[m]} ${y}</span>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid">
      ${dowLabels.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${dayCells}
    </div>
    <div style="padding:10px 16px;border-top:1px solid #f0ede8;display:flex;align-items:center;gap:16px">
      <div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:#2e7d32"></div><span style="font-size:11px;color:#888;font-family:'Courier New',monospace">Training</span></div>
      <span style="font-size:11px;color:#bbb;font-family:'Courier New',monospace;margin-left:auto">Tippen = Details</span>
    </div>
  </div>
  <div class="slabel">Alle Trainingstage</div>
  ${Object.entries(buildDateMap()).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,20).map(([dk,entries])=>{
    const d=new Date(dk+'T12:00:00');
    const label=d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});
    const exNames=[...new Set(entries.map(e=>e.exName))];
    const colors=[...new Set(entries.map(e=>e.phaseColor))];
    return `<div style="background:#fff;border:1px solid #e8e6e0;border-left:3px solid ${colors[0]||'#ddd'};border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04)" onclick="selectCalDay('${dk}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-family:'Courier New',monospace;color:#666">${label}</span>
        <span style="font-size:11px;color:#bbb;font-family:'Courier New',monospace">${entries.length} Einträge</span>
      </div>
      <div style="font-size:13px;color:#444;margin-top:4px">${exNames.slice(0,4).join(', ')}${exNames.length>4?` +${exNames.length-4}`:''}</div>
    </div>`;
  }).join('')}
  ${Object.keys(buildDateMap()).length===0?`<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">Noch keine Einheiten eingetragen.</div>`:''}
  </div>`;
}

const MEASURES=[
  {key:'gewicht',label:'Gewicht',unit:'kg',x:50,y:7,side:'right'},
  {key:'brust',label:'Brust',unit:'cm',x:50,y:25,side:'right'},
  {key:'schulter',label:'Schulter',unit:'cm',x:50,y:18,side:'left'},
  {key:'oberarm_l',label:'Oberarm L',unit:'cm',x:22,y:28,side:'left'},
  {key:'oberarm_r',label:'Oberarm R',unit:'cm',x:78,y:28,side:'right'},
  {key:'taille',label:'Taille',unit:'cm',x:50,y:35,side:'right'},
  {key:'bauch',label:'Bauch',unit:'cm',x:50,y:42,side:'left'},

  {key:'unterarm',label:'Unterarm',unit:'cm',x:50,y:88,side:'right'},
];
const MCOLOR='#1565c0';
function latestMeas(key){const arr=S.measurements[key]||[];return arr.length?arr[arr.length-1]:null;}

function rBody(){
  const figSvg=`<svg viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg" style="width:180px;height:360px;display:block;margin:0 auto">
    <ellipse cx="50" cy="12" rx="9" ry="10" fill="#d0d8e8" stroke="#b0bcd4" stroke-width=".8"/>
    <rect x="46" y="21" width="8" height="6" rx="2" fill="#d0d8e8" stroke="#b0bcd4" stroke-width=".8"/>
    <path d="M30 27 Q22 30 20 50 Q19 65 26 75 Q35 80 50 80 Q65 80 74 75 Q81 65 80 50 Q78 30 70 27 Z" fill="#d0d8e8" stroke="#b0bcd4" stroke-width=".8"/>
    <path d="M30 28 Q18 35 14 55 Q12 65 16 72" fill="none" stroke="#c0cce0" stroke-width="7" stroke-linecap="round"/>
    <path d="M70 28 Q82 35 86 55 Q88 65 84 72" fill="none" stroke="#c0cce0" stroke-width="7" stroke-linecap="round"/>
    <path d="M40 79 Q38 100 36 120 Q34 140 34 158" fill="none" stroke="#c0cce0" stroke-width="9" stroke-linecap="round"/>
    <path d="M60 79 Q62 100 64 120 Q66 140 66 158" fill="none" stroke="#c0cce0" stroke-width="9" stroke-linecap="round"/>
    <ellipse cx="34" cy="162" rx="7" ry="4" fill="#c0cce0"/>
    <ellipse cx="66" cy="162" rx="7" ry="4" fill="#c0cce0"/>
  </svg>`;

  const dots=MEASURES.map(m=>{
    const latest=latestMeas(m.key);
    const hasVal=!!latest;
    const dotColor=hasVal?MCOLOR:'#bbb';
    const labelSide=m.side==='left'?'right:calc(100% + 4px)':'left:calc(100% + 4px)';
    return `<div class="mpoint" style="left:${m.x}%;top:${m.y}%" onclick="openMeasure('${m.key}')">
      <div class="mdot" style="background:${dotColor}">${hasVal?`<span>${latest.value}</span>`:'＋'}</div>
      <div class="mlabel" style="${labelSide};top:50%;transform:translateY(-50%);color:${hasVal?MCOLOR:'#bbb'}">${m.label}</div>
    </div>`;
  }).join('');

  let measurePanel='';
  if(S.activeMeasure){
    const m=MEASURES.find(x=>x.key===S.activeMeasure);
    const hist=S.measurements[S.activeMeasure]||[];
    const latest=hist.length?hist[hist.length-1]:null;
    measurePanel=`<div style="background:#e8f0fe;border:1px solid #bad3f7;border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:11px;color:${MCOLOR};font-family:'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase">${m.label}</div>
          ${latest?`<div style="font-size:20px;font-family:'Courier New',monospace;color:#1a1a1a">${latest.value} ${m.unit} <span style="font-size:12px;color:#888">· ${fmtDate(latest.date)}</span></div>`:'<div style="font-size:13px;color:#888">Noch kein Eintrag</div>'}
        </div>
        <button onclick="S.activeMeasure=null;render()" style="background:none;border:none;font-size:18px;color:#888;cursor:pointer">✕</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="meas-input" type="number" step="0.1" min="0" max="500" value="${latest?latest.value:''}" placeholder="${m.unit}"
          style="width:100px;padding:8px 12px;border-radius:8px;border:1px solid #bad3f7;background:#fff;font-family:'Courier New',monospace;font-size:16px;color:#1a1a1a;outline:none"/>
        <span style="font-size:14px;color:#666;font-family:'Courier New',monospace">${m.unit}</span>
        <button onclick="saveMeasure('${m.key}')" style="padding:8px 16px;border-radius:8px;background:${MCOLOR};color:#fff;border:none;font-family:'Courier New',monospace;font-size:13px;font-weight:700">Speichern</button>
      </div>
      ${hist.length>0?`<div style="margin-top:12px">
        <div style="font-size:9px;color:#888;font-family:'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Verlauf</div>
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
          ${hist.slice().reverse().slice(0,10).map((e,i)=>`<div style="flex:0 0 auto;background:#fff;border:1px solid #bad3f7;border-radius:6px;padding:6px 10px;text-align:center">
            <div style="font-size:14px;font-family:'Courier New',monospace;color:${MCOLOR}">${e.value}</div>
            <div style="font-size:9px;color:#aaa;margin-top:1px">${fmtDate(e.date)}</div>
            <button onclick="delMeasure('${m.key}',${hist.length-1-i})" style="background:none;border:none;color:#ddd;font-size:11px;cursor:pointer;margin-top:2px">✕</button>
          </div>`).join('')}
        </div>
      </div>`:''}
    </div>`;
  }

  const wlog=S.weightLog.slice(-10);
  let wChart='';
  if(wlog.length>=2){
    const vals=wlog.map(e=>e.value);
    const mn=Math.min(...vals)-1, mx=Math.max(...vals)+1, rng=mx-mn||1;
    const W=300,H=60;
    const pts=vals.map((v,i)=>`${Math.round(i*(W/(vals.length-1))||0)},${Math.round(H-(v-mn)/rng*H)}`).join(' ');
    const diff=parseFloat((vals[vals.length-1]-vals[0]).toFixed(1));
    wChart=`<div style="background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:13px;color:#1a1a1a">Gewichtsverlauf</div>
        <div style="font-size:13px;font-family:'Courier New',monospace;color:${diff<=0?'#2e7d32':'#e65100'}">${diff>0?'+':''}${diff} kg</div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:60px;overflow:visible">
        <polyline points="${pts}" fill="none" stroke="${MCOLOR}" stroke-width="2" stroke-linejoin="round"/>
        ${vals.map((v,i)=>`<circle cx="${Math.round(i*(W/(vals.length-1))||0)}" cy="${Math.round(H-(v-mn)/rng*H)}" r="3" fill="${MCOLOR}"/>`).join('')}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#aaa;font-family:'Courier New',monospace;margin-top:4px">
        <span>${fmtDate(wlog[0].date)}</span><span>${fmtDate(wlog[wlog.length-1].date)}</span>
      </div>
    </div>`;
  }

  const overview=MEASURES.map(m=>{
    const hist=S.measurements[m.key]||[];
    if(hist.length===0)return'';
    const latest=hist[hist.length-1];
    const prev=hist.length>1?hist[hist.length-2]:null;
    const diff=prev?parseFloat((latest.value-prev.value).toFixed(1)):null;
    return `<div class="mcard" onclick="openMeasure('${m.key}')">
      <div class="mcard-body" style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-size:13px;color:#1a1a1a">${m.label}</div><div style="font-size:11px;color:#aaa;margin-top:1px">${fmtDate(latest.date)}</div></div>
        <div style="text-align:right">
          <div style="font-size:18px;font-family:'Courier New',monospace;color:${MCOLOR}">${latest.value} <span style="font-size:12px;color:#aaa">${m.unit}</span></div>
          ${diff!==null?`<div style="font-size:11px;font-family:'Courier New',monospace;color:${diff===0?'#aaa':diff<0?'#2e7d32':'#e65100'}">${diff>0?'+':''}${diff} ${m.unit}</div>`:''}
        </div>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  return `<div class="content">
  <div style="font-size:11px;color:#888;font-family:'Courier New',monospace;line-height:1.7;background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:12px 14px;margin-bottom:16px">
    Tippe auf einen <span style="color:${MCOLOR}">●</span> Punkt am Körper um ein Maß einzutragen.
  </div>
  ${measurePanel}
  <div style="position:relative;width:180px;margin:0 auto 8px">
    ${figSvg}
    <div style="position:absolute;top:0;left:0;width:100%;height:100%">${dots}</div>
  </div>
  ${wChart}
  ${overview?`<div class="slabel" style="margin-top:8px">Alle Maße</div>${overview}`:`<div style="text-align:center;padding:20px;font-size:13px;color:#bbb">Tippe auf einen Punkt um zu starten.</div>`}
  </div>`;
}

// ─── RENDER: FREE TRAINING ────────────────────────────────────────────────────

function diagStorage(){
  const allKeys=Object.keys(localStorage);
  const known=['training_app_data','fp3_log','fp3_plan','fp3_meas','fp3_wlog','fp3_free','fp3_chat','fp3_key','fp3_gkey','fp3_groqkey','fp3_orkey','fp3_prov','fp2_log','fp2_plan','fp2_meas','fp2_wlog','fp_log','fp_plan','fitapp_log','fitapp_plan'];
  const found=allKeys.filter(k=>known.includes(k)||k.startsWith('fp'));
  const unknown=allKeys.filter(k=>!known.includes(k)&&!k.startsWith('fp'));

  let msg='<b>Gefundene Keys:</b><br>';
  if(allKeys.length===0){msg+='Keine localStorage-Daten gefunden.';
  } else {
    found.forEach(k=>{
      try{
        const v=localStorage.getItem(k);
        const parsed=JSON.parse(v);
        let info='';
        if(k==='training_app_data'){
          const logCount=Object.values(parsed.log||{}).reduce((a,b)=>a+b.length,0);
          info=`→ ${logCount} Logs, Plan: ${parsed.plan?'✓':'–'}`;
        } else if(k.includes('log')){
          const parsed2=typeof parsed==='object'?parsed:{};
          const count=Array.isArray(parsed2)?parsed2.length:Object.values(parsed2).reduce((a,b)=>a+(Array.isArray(b)?b.length:0),0);
          info=`→ ${count} Einträge`;
        } else {
          info=`→ ${v?v.length:0} Zeichen`;
        }
        msg+=`<span style="color:#1565c0">${k}</span> ${info}<br>`;
      } catch(e){msg+=`${k} (kein JSON)<br>`;}
    });
    if(unknown.length>0) msg+=`<br><b>Andere Keys:</b> ${unknown.join(', ')}`;
    if(found.length===0) msg+='Keine bekannten Training-Keys gefunden.';
  }
  S.diagMsg=msg;
  render();
}

    ${backupReminder}
    <div class="topbar">
      ${canGoBack?`<button class="back-btn" onclick="goBack()">‹</button>`:''}
      <div class="topbar-titles">
        <div class="topbar-sub">Mein Krafttraining</div>
        <div class="topbar-title">${titles[S.view]||''}</div>
      </div>
      <div class="topbar-right">
        <div class="phase-dot" style="background:${c}"></div>
        <span class="phase-label">${ph.name}</span>
        <button onclick="setView('settings')" style="background:none;border:none;font-size:18px;color:${S.view==='settings'?c:'#bbb'};padding:2px 0 2px 8px;cursor:pointer;line-height:1">⚙</button>
      </div>
    </div>
    ${body}
    <div class="bottomnav">
      ${navItems.map(n=>`<button class="nav-btn" onclick="setView('${n.id}')">
        <span class="nav-icon" style="color:${S.view===n.id?c:'#ccc'}">${n.icon}</span>
        <span class="nav-lbl" style="color:${S.view===n.id?c:'#bbb'}">${n.lbl}</span>
      </button>`).join('')}
    </div>`;
}

// ─── PWA ──────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`const C='ft5';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

render();
</script>
</body>
</html>
